name: Phase 0 — IP Viability Probe

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/probe.py"
      - ".github/workflows/phase0-probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Pass proxy through if set; probe.py reads it via browser_context_options().
      SCRAPING_PROXY_URL: ${{ secrets.SCRAPING_PROXY_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install "playwright==1.61.0" "playwright-stealth==1.0.6"
          playwright install chromium --with-deps

      - name: Run IP viability probe
        run: python scripts/probe.py

      - name: Report proxy guidance on failure
        if: failure()
        run: |
          echo "===================================================="
          echo "Phase 0 FAILED."
          if [ -z "$SCRAPING_PROXY_URL" ]; then
            echo "SCRAPING_PROXY_URL is not set."
            echo "Add a free scraping-proxy URL as the repo secret"
            echo "SCRAPING_PROXY_URL (e.g. ScraperAPI proxy endpoint)"
            echo "and re-run this workflow."
          else
            echo "SCRAPING_PROXY_URL is set but probe still failed."
            echo "Check the proxy credentials or try a different provider."
          fi
          echo "===================================================="
