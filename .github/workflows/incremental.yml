name: Incremental Crawl + Analysis + Alerts
# Runs every 4 hours: scrapes newest listings, scores deals, fires Telegram alerts.

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours (best-effort — GitHub may delay 5–30 min)
  workflow_dispatch:

jobs:
  incremental:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:   ${{ secrets.SUPABASE_ANON_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      SCRAPING_PROXY_URL:  ${{ secrets.SCRAPING_PROXY_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Scrape new listings (incremental)
        run: python scripts/run_scraper.py --mode incremental --source all

      - name: Run analysis and send deal alerts
        run: python scripts/run_analysis.py --threshold 0.15 --min-comp 5 --max-alerts 10
